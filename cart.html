<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - 98 CAPS</title>
    <link rel="stylesheet" href="style.css"> </head>
<body style="background-color: #f4f6f9;">

    <header class="main-header">
        </header>

    <main class="cart-container">
        <div class="cart-wrapper">
            <h2>Shopping Cart</h2>

            <div class="cart-content-layout">
                <div class="cart-items-section">
                    
                    <div class="cart-table-header">
                        <div class="header-pill">Product</div>
                        <div class="header-pill text-center">Quantity</div>
                        <div class="header-pill text-center">Price</div>
                    </div>

                    <div id="cart-items-list">
                        </div>

                </div>

                <div class="cart-summary-section">
                    <div class="summary-box">
                        <h3>Order Summary</h3>
                        
                        <div id="summary-items-list" class="summary-list">
                            </div>

                        <hr class="summary-divider">

                        <div class="summary-totals">
                            <div class="total-row">
                                <span>Subtotal</span>
                                <span id="summary-subtotal" style="color: #f26522; font-weight: bold;">$0.00</span>
                            </div>
                            <div class="total-row">
                                <span>Tax</span>
                                <span style="color: #f26522;">$2.00</span>
                            </div>
                        </div>
                    </div>

                    <div class="summary-buttons">
                        <button class="btn-back-shop" onclick="window.location.href='index.html'">Back to Shop</button>
                       <button class="btn-confirm-order" onclick="window.location.href='payment.html'">Confirm Order</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
