<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baseball Hats - 98 CAPS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #ffffff; margin: 0; padding: 0;">

    <header class="main-header">
        <nav class="navbar" style="background-color: #0d1322; display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; position: relative; z-index: 9999;">
            <div class="logo">
                <a href="index.html">
                    <img src="assets/images/logo.png" alt="98 CAPS" style="height: 50px;">
                </a>
            </div>
            
            <div class="nav-links" style="display: flex; gap: 30px; align-items: center;">
                <a href="index.html" style="color: white; text-decoration: none;">Home</a>
                
                <div class="dropdown" style="position: relative; display: inline-block;">
                    <a href="#" style="color: white; text-decoration: none; cursor: pointer;">
                        Category <i class="fa-solid fa-chevron-down" style="font-size: 12px;"></i>
                    </a>
                    <div class="dropdown-content" style="display: none; position: absolute; background-color: #0d1322; min-width: 150px; z-index: 999; top: 100%; left: 0; padding: 10px 0;">
                        <a href="category-snapback.html" style="color: white; padding: 10px 15px; text-decoration: none; display: block; transition: color 0.2s;">Snapback Hats</a>
                        <a href="category-trucker.html" style="color: white; padding: 10px 15px; text-decoration: none; display: block; transition: color 0.2s;">Trucker Hats</a>
                        <a href="category-baseball.html" style="color: white; padding: 10px 15px; text-decoration: none; display: block; transition: color 0.2s;">Baseball Hats</a>
                    </div>
                </div>
                
                <a href="#" style="color: white; text-decoration: none;">Contact</a>
            </div>
            
            <div class="search-cart-container" style="background-color: #ff6b00; padding: 8px 15px; border-radius: 25px; display: flex; align-items: center; gap: 15px;">
                <i class="fa-solid fa-magnifying-glass" style="color: #0d1322;"></i>
                <input type="text" placeholder="Search....." style="background: transparent; border: none; outline: none; color: #0d1322; width: 100px;">
                <a href="cart.html" style="color: #0d1322;"><i class="fa-solid fa-cart-shopping"></i></a>
            </div>
        </nav>
    </header>

    <div class="banner-kategori">
        <img src="assets/images/banner-baseball.png" alt="Baseball Hats Banner">
    </div>

    <main class="kategori-container">
        <div class="badge-kategori">Baseball Hats</div>

        <div class="product-grid">
            
            <div class="product-card" onclick="goToDetail(21)">
                <h3 class="product-title">Puerto Rico Away Blue</h3>
                <div class="product-img-wrapper">
                    <img src="assets/images/rr.png" alt="Braves" class="img-main">
                    <img src="assets/images/rr-model.png" alt="Braves Model" class="img-hover">
                </div>
                <p class="product-price">$38.99</p>
            </div>

            <div class="product-card" onclick="goToDetail(22)">
                <h3 class="product-title">Liberty Flames Scarlet</h3>
                <div class="product-img-wrapper">
                    <img src="assets/images/flame.png" alt="Astros" class="img-main">
                    <img src="assets/images/flame-model.png" alt="Astros Model" class="img-hover">
                </div>
                <p class="product-price">$39.99</p>
            </div>

            <div class="product-card" onclick="goToDetail(23)">
                <h3 class="product-title">Dominican Republic Home Blue</h3>
                <div class="product-img-wrapper">
                    <img src="assets/images/d.png" alt="Rangers" class="img-main">
                    <img src="assets/images/d-model.png" alt="Rangers Model" class="img-hover">
                </div>
                <p class="product-price">$37.99</p>
            </div>

            <div class="product-card" onclick="goToDetail(24)">
                <h3 class="product-title">Seattle Mariners Baseball</h3>
                <div class="product-img-wrapper">
                    <img src="assets/images/dodgers.png" alt="Mariners" class="img-main">
                    <img src="assets/images/dodgers-model.png" alt="Mariners Model" class="img-hover">
                </div>
                <p class="product-price">$34.99</p>
            </div>

            <div class="product-card" onclick="goToDetail(25)">
                <h3 class="product-title">Toronto Blue Jays Baseball</h3>
                <div class="product-img-wrapper">
                    <img src="assets/images/yankees-bw.png" alt="Blue Jays" class="img-main">
                    <img src="assets/images/yankees-model.png" alt="Blue Jays Model" class="img-hover">
                </div>
                <p class="product-price">$38.99</p>
            </div>

            <div class="product-card" onclick="goToDetail(26)">
                <h3 class="product-title">Chicago Cubs Baseball</h3>
                <div class="product-img-wrapper">
                    <img src="assets/images/chelsea.png" alt="Cubs" class="img-main">
                    <img src="assets/images/chelsea-model.png" alt="Cubs Model" class="img-hover">
                </div>
                <p class="product-price">$39.99</p>
            </div>

        </div>
    </main>

    <div class="bottom-bar"></div>

    <script src="script.js"></script>

    <script>
        const dropdown = document.querySelector('.dropdown');
        const dropdownContent = document.querySelector('.dropdown-content');

        dropdown.addEventListener('mouseenter', () => dropdownContent.style.display = 'block');
        dropdown.addEventListener('mouseleave', () => dropdownContent.style.display = 'none');
        
        const dropdownLinks = document.querySelectorAll('.dropdown-content a');
        dropdownLinks.forEach(link => {
            link.addEventListener('mouseenter', () => {
                link.style.color = '#ff6b00';
            });
            link.addEventListener('mouseleave', () => {
                link.style.color = '#ffffff';
            });
        });
    </script>
</body>
</html>
